global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/cat-diary-alerts.yml

scrape_configs:
  - job_name: cat-diary-api
    metrics_path: /api/v1/metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics_token
    static_configs:
      - targets: ['api:3000']

  - job_name: cat-diary-worker
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics_token
    static_configs:
      - targets: ['worker:3001']
