services:
  migrate:
    image: ${API_IMAGE:?API_IMAGE is required}
    restart: 'no'
    env_file: ${ENV_FILE:-../.env.preview}
    command: ['./node_modules/.bin/prisma', 'migrate', 'deploy', '--schema', 'prisma/schema.prisma']

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    restart: unless-stopped
    init: true
    env_file: ${ENV_FILE:-../.env.preview}
    ports:
      - '${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-3000}:3000'
    depends_on:
      migrate:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'

  worker:
    image: ${WORKER_IMAGE:?WORKER_IMAGE is required}
    restart: unless-stopped
    init: true
    env_file: ${ENV_FILE:-../.env.preview}
    depends_on:
      migrate:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
