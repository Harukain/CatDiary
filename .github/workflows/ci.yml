name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: catdiary
          POSTGRES_PASSWORD: catdiary
          POSTGRES_DB: catdiary
        ports: ['5433:5432']
        options: >-
          --health-cmd "pg_isready -U catdiary -d catdiary"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://catdiary:catdiary@127.0.0.1:5433/catdiary?schema=public
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint:eslint
      - run: pnpm db:validate
      - run: pnpm exec prisma migrate deploy
      - run: pnpm exec prisma migrate status
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm test:mobile-config
      - run: pnpm test:privacy-manifest
      - run: pnpm test:integration
      - run: pnpm test:restore
        env:
          SOURCE_DATABASE_URL: postgresql://catdiary:catdiary@127.0.0.1:5433/catdiary?schema=public
      - run: pnpm --filter @cat-diary/mobile exec expo export --platform ios --output-dir dist-ci-ios
        env:
          EXPO_NO_TELEMETRY: '1'
          APP_ENV: production
          EXPO_PUBLIC_API_URL: https://api.example.invalid/api/v1
          EAS_PROJECT_ID: 123e4567-e89b-42d3-a456-426614174000
          EXPO_PUBLIC_PRIVACY_POLICY_URL: https://www.example.com/privacy
          EXPO_PUBLIC_TERMS_URL: https://www.example.com/terms
      - run: pnpm --filter @cat-diary/mobile exec expo export --platform android --output-dir dist-ci-android
        env:
          EXPO_NO_TELEMETRY: '1'
          APP_ENV: production
          EXPO_PUBLIC_API_URL: https://api.example.invalid/api/v1
          EAS_PROJECT_ID: 123e4567-e89b-42d3-a456-426614174000
          EXPO_PUBLIC_PRIVACY_POLICY_URL: https://www.example.com/privacy
          EXPO_PUBLIC_TERMS_URL: https://www.example.com/terms
      - run: pnpm audit --audit-level high

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  containers:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: ./scripts/verify-monitoring.sh
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          push: false
          tags: cat-diary-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          load: true
          push: false
          tags: cat-diary-worker:ci
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
      - uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: cat-diary-api:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
      - uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: cat-diary-worker:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
