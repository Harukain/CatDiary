appId: com.haruka.catdiary
name: '01 登录与首次建档'
tags:
  - smoke
  - mvp
env:
  CATDIARY_E2E_PHONE: '13900139001'
  CATDIARY_E2E_FAMILY: 'Maestro 验收家庭'
  CATDIARY_E2E_PET: 'Maestro 验收猫'
---
- launchApp
- openLink: catdiary:///e2e-reset
- waitForAnimationToEnd
- assertVisible:
    id: login.phone.input
- tapOn:
    id: login.phone.input
- inputText: ${CATDIARY_E2E_PHONE}
- tapOn:
    id: login.send-code.button
- assertVisible:
    id: login.code.input
- tapOn:
    id: login.code.input
- inputText: '123456'
- tapOn:
    id: login.verify.button
- assertVisible:
    id: onboarding.family.name.input
- tapOn:
    id: onboarding.family.name.input
- eraseText
- inputText: ${CATDIARY_E2E_FAMILY}
- tapOn:
    id: onboarding.family.submit.button
- assertVisible:
    id: onboarding.pet.name.input
- tapOn:
    id: onboarding.pet.name.input
- inputText: ${CATDIARY_E2E_PET}
- tapOn:
    id: onboarding.pet.submit.button
- assertVisible:
    id: home.title
