appId: com.haruka.catdiary
name: '06 疫苗档案与下次日期'
tags:
  - smoke
  - mvp
env:
  CATDIARY_E2E_PHONE: '13900139051'
  CATDIARY_E2E_FAMILY: 'Maestro 医疗验收家庭'
  CATDIARY_E2E_PET: 'Maestro 医疗验收猫'
  CATDIARY_E2E_MEDICAL_TITLE: 'Maestro 猫三联加强针'
---
- launchApp:
    clearState: true
- waitForAnimationToEnd
- assertVisible:
    id: login.phone.input
- tapOn:
    id: login.phone.input
- inputText: ${CATDIARY_E2E_PHONE}
- tapOn:
    id: login.send-code.button
- assertVisible:
    id: login.code.input
- tapOn:
    id: login.code.input
- inputText: '123456'
- tapOn:
    id: login.verify.button
- assertVisible:
    id: onboarding.family.name.input
- tapOn:
    id: onboarding.family.name.input
- eraseText
- inputText: ${CATDIARY_E2E_FAMILY}
- tapOn:
    id: onboarding.family.submit.button
- assertVisible:
    id: onboarding.pet.name.input
- tapOn:
    id: onboarding.pet.name.input
- inputText: ${CATDIARY_E2E_PET}
- tapOn:
    id: onboarding.pet.submit.button
- assertVisible:
    id: home.title
- tapOn: 我的
- assertVisible:
    id: me.title
- scrollUntilVisible:
    element:
      id: me.pets.button
    direction: DOWN
- tapOn:
    id: me.pets.button
- assertVisible:
    id: pets.title
- assertVisible:
    id: pets.item
- tapOn:
    id: pets.item
- assertVisible:
    id: pet-detail.title
- tapOn:
    id: pet-detail.quick-medical.button
- assertVisible:
    id: medical-records.title
- tapOn:
    id: medical-records.add.button
- assertVisible:
    id: medical-new.title
- assertVisible:
    id: medical-new.pet.item
- tapOn:
    id: medical-new.type.VACCINE
- tapOn:
    id: medical-new.title.input
- inputText: ${CATDIARY_E2E_MEDICAL_TITLE}
- tapOn:
    id: medical-new.occurred-date.input
- eraseText
- inputText: '2026-07-15'
- tapOn:
    id: medical-new.next-date.input
- eraseText
- inputText: '2027-07-15'
- tapOn:
    id: medical-new.brand.input
- inputText: '妙三多'
- hideKeyboard
- scrollUntilVisible:
    element:
      id: medical-new.submit.button
    direction: DOWN
- tapOn:
    id: medical-new.submit.button
- tapOn: 知道了
- assertVisible:
    id: medical-records.title
- assertVisible:
    id: medical-records.item
- assertVisible:
    id: medical-records.next-date
- tapOn:
    id: medical-records.close.button
- assertVisible:
    id: pet-detail.title
- scrollUntilVisible:
    element:
      id: pet-detail.medical.next-due.item
    direction: DOWN
